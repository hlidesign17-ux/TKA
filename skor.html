<!doctype html>
<html>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <head>
    <title>Hasil Ujian</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        text-align: center;
        padding: 20px;
        margin: 0;
      }

      .box {
        background: white;
        padding: 25px;
        display: inline-block;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        width: 100%;
        max-width: 800px;
      }

      .nilai {
        font-size: 60px;
        font-weight: 600;
        color: #22c55e;
        margin-bottom: 20px;
      }

      button {
        padding: 12px 20px;
        border: none;
        border-radius: 6px;
        background: #3b82f6;
        color: white;
        cursor: pointer;
        font-family: "Poppins";
        margin: 5px;
      }

      button:hover {
        opacity: 0.9;
      }

      /* TABLE */
      .table-container {
        width: 100%;
        overflow-x: auto;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 20px;
        display: none;
        min-width: 400px; /* supaya tidak gepeng */
      }

      th,
      td {
        border: 1px solid #e2e8f0;
        padding: 10px;
        text-align: center;
      }

      th {
        background: #f1f5f9;
      }

      .benar {
        background: #dcfce7;
      }

      .salah {
        background: #fee2e2;
      }

      /* RESPONSIVE */
      @media (max-width: 600px) {
        .nilai {
          font-size: 40px;
        }

        h2 {
          font-size: 20px;
        }

        .box {
          padding: 20px;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h2>Hasil Ujian</h2>

      <div class="nilai" id="nilai"></div>

      <button onclick="lihatJawaban()">Lihat Jawaban</button>
      <br /><br />

      <button onclick="kembali()">Kembali ke Menu</button>

      <table id="tabelJawaban">
        <tr>
          <th>No</th>
          <th>Jawaban User</th>
          <th>Jawaban Sistem</th>
        </tr>
      </table>
    </div>

    <script src="skor.js"></script>
  </body>
</html>
